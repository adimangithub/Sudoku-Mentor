<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku Mentor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Sudoku Mentor</h1>
    <p class="subtitle">Enter a Sudoku puzzle and get progressive hints.</p>

    <div id="board"></div>

    <div class="buttons">
      <button id="random">Random Puzzle</button>
      <button id="hint1">Hint 1</button>
      <button id="hint2" disabled>Hint 2</button>
      <button id="solve">Solve</button>
      <button id="clear">Clear</button>
    </div>

    <p id="message">Enter numbers 1-9 in the grid. Use hints to learn and solve.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
